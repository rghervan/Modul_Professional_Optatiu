<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Pas 4: Clic Dret</title>
  <style>
    body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; font-family: sans-serif; }
    canvas { background-color: white; border: 3px solid #2c3e50; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    .info { background: white; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="info"><strong>Exercici:</strong> Botó dret per frenar</div>
<canvas id="jocCanvas" width="600" height="400"></canvas>
<script>
  let canvas = document.getElementById("jocCanvas");
  let ctx = canvas.getContext("2d");
  let x = canvas.width / 2; let y = canvas.height / 2;
  let dx = 4; let dy = -4; let radi = 20;
  let colorPilota = "#e74c3c"; 

  function dibuixarPilota() {
    ctx.beginPath(); ctx.arc(x, y, radi, 0, Math.PI * 2);
    ctx.fillStyle = colorPilota; ctx.fill(); ctx.closePath();
  }

  function actualitzar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); 
    dibuixarPilota();
    let rebota = false; let paret = "";
    if(x + dx > canvas.width - radi || x + dx < radi) { dx = -dx; rebota = true; paret = "vertical"; }
    if(y + dy > canvas.height - radi || y + dy < radi) { dy = -dy; rebota = true; paret = "horitzontal"; }
    if(rebota) { canvas.dispatchEvent(new CustomEvent('rebot', { detail: { paret: paret } })); }
    x += dx; y += dy;
    requestAnimationFrame(actualitzar); 
  }
  actualitzar();

  // --- CODI D'EVENTS ---
  canvas.addEventListener('click', function(e) {
    let rect = canvas.getBoundingClientRect();
    x = e.clientX - rect.left;
    y = e.clientY - rect.top;
    colorPilota = '#' + Math.floor(Math.random()*16777215).toString(16);
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === " ") { dx = -dx; dy = -dy; }
    else if (e.key === "ArrowUp") { dx *= 1.2; dy *= 1.2; }
    else if (e.key === "ArrowDown") { dx *= 0.8; dy *= 0.8; }
  });
  canvas.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    dx = 0; dy = 0;
  });
</script>
</body>
</html>
