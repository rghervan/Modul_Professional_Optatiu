<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisió amb control d'errors</title>
</head>
<body>

    <h1>Divisió amb control d'errors</h1>

    <label for="num1">Primer nombre:</label>
    <input type="number" id="num1">

    <br><br>

    <label for="num2">Segon nombre (divisor):</label>
    <input type="number" id="num2">

    <br><br>

    <button onclick="ferDivisio()">Calcular divisió</button>

    <div id="resultat"></div>
<script>
    function ferDivisio(){
        let n1=document.getElementById("num1").value;
        let n2=document.getElementById("num2").value;
        let resultat = document.getElementById("resultat");

        n1 = Number (n1);
        n2 = Number (n2);

        if (n2 === 0){
            resultat.textContent = "Error"
        } else {
            let divisio = n1 / n2;
            resultat.textContent = "Resultat:" + divisio;
        }
}
</script>

</body>
</html>
