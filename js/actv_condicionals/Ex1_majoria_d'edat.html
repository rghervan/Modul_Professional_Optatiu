<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exersici1</title>
</head>
<body>
    <h1>Verifica edat</h1>
    <label for="edat">Edat</label>
    <input type="text" id="edat">
    <button onclick="verificarMajoria()">Prem per verificar</button>
    <div id="majoredat"> </div>

    <script>
        function verificarMajoria(){
        let edat= document.getElementById("edat").value;
        let resultat=document.getElementById("majoredat");
        if (edat >= 18) {
            resultat.textContent="Ets major d'edat";
        }
        else{
            resultat.textContent="Ets menor d'edat";
        }
        }
    </script>
</body>
</html>
