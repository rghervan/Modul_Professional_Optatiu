<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Verifica contraseña</h1>

    <label for="contrasenya">Contraseña</label>
    <input type="text" id="contrasenya">

    <button onclick="verificarContraseña()">Prem per verificar</button>

    <div id="resultat"></div>

    <script>
        function verificarContraseña() {
            let secreta = "cinco";

            let pass = document.getElementById("contrasenya");
            let contrasenyainput = pass.value;

            let resultat = document.getElementById("resultat");

            if (secreta === contrasenyainput) {
                resultat.textContent = "Contraseña correcta";
            } else {
                resultat.textContent = "Contraseña incorrecta";
            }
        }
    </script>
</body>
</html>
